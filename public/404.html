<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found — simplegrad">
  <title>404 — simplegrad</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ══════════════ HEADER ══════════════ -->
  <header>
    <a href="/" class="header-logo" aria-label="simplegrad home">
      <img src="assets/simplegrad_logo_hor.svg" alt="simplegrad">
    </a>
    <a href="https://github.com/gri-sha/simplegrad" class="gh-link" target="_blank" rel="noopener noreferrer">
      <img class="gh-icon" src="assets/github.svg" alt="">
      GitHub
    </a>
  </header>

  <!-- ══════════════ 404 ══════════════ -->
  <section class="hero">
    <div class="hero-content">

      <p class="fourofour-code" aria-hidden="true">404</p>

      <h1 class="hero-heading">
        Page not found.
      </h1>

      <p class="hero-desc">
        This page doesn't exist — or it got lost somewhere in the gradient.<br>
        Try heading back to the start.
      </p>

      <div class="hero-buttons">
        <a href="/" class="btn btn-primary">Back to home →</a>
      </div>

    </div>
  </section>

  <!-- ══════════════ FOOTER ══════════════ -->
  <footer>
    <span class="footer-copy">© 2026 simplegrad.org</span>
    <a href="mailto:contact@simplegrad.org" class="footer-email">contact@simplegrad.org</a>
  </footer>

  <style>
    .fourofour-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(4rem, 16vw, 9rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--green);
      margin-bottom: 1rem;
      animation: fadeUp 0.65s ease both;
    }

    .fourofour-code ~ .hero-heading {
      animation-delay: 0.1s;
    }
  </style>

</body>
</html>
